[env:stm32f103c8t6]
platform = ststm32
board = genericSTM32F103C8
framework = stm32cube

upload_protocol = jlink     ; SWD
; upload_protocol = jlink-jtag  ; 如果你走 JTAG

debug_tool = jlink
debug_speed = 12000          ; 单位 kHz，可改成 auto / adaptive

build_flags =
  -D USE_HAL_DRIVER
  -D STM32F103x8
  -I include
